<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interaktywna aplikacja Quiz - Fiszki z pytaniami o sieciach komputerowych">
    <title>Quiz - Sieci komputerowe i internet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header z logo -->
        <header class="header">
            <h1 class="logo">Sieci komputerowe i internet</h1>
            <p class="tagline"><a href="https://github.com/mateq2005/sieci-komputerowe-i-internet">Zobacz całe repozytorium!</a></p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Loading State -->
            <div id="loadingState" class="state loading-state">
                <div class="spinner"></div>
                <p>Ładowanie pytań...</p>
            </div>

            <!-- Quiz State -->
            <div id="quizState" class="state quiz-state hidden">
                <!-- Progress Bar -->
                <div class="progress-section">
                    <div class="progress-info">
                        <span class="progress-label">Postęp</span>
                        <span id="progressText" class="progress-text">0/0</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <!-- Question Card -->
                <div class="question-card">
                    <div class="question-number">
                        <span id="questionNumber">1</span>
                    </div>
                    
                    <h2 id="questionText" class="question-text">
                        Ładowanie pytania...
                    </h2>

                    <!-- Answers Container -->
                    <div id="answersContainer" class="answers-container">
                        <!-- Answers will be generated by JavaScript -->
                    </div>

                    <!-- Action Buttons -->
                    <div class="actions">
                        <button id="submitBtn" class="btn btn-primary" disabled>
                            Zatwierdź odpowiedź
                        </button>
                        <button id="nextBtn" class="btn btn-secondary hidden">
                            Następne pytanie
                        </button>
                        <button id="skipBtn" class="btn btn-skip">
                            Pomiń pytanie
                        </button>
                    </div>

                    <!-- Feedback Message -->
                    <div id="feedbackMessage" class="feedback hidden">
                        <span id="feedbackText"></span>
                    </div>
                </div>
            </div>

            <!-- Completion State -->
            <div id="completionState" class="state completion-state hidden">
                <div class="completion-content">
                    <div class="celebration">🎉</div>
                    <h2>Gratulacje!</h2>
                    <p class="completion-message">
                        Odpowiedziałeś poprawnie na <strong>wszystkie pytania</strong>!
                    </p>
                <div class="completion-stats">
                    <div class="stat">
                        <span class="stat-value" id="totalQuestions">0</span>
                        <span class="stat-label">pytań</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="correctAnswers">0</span>
                        <span class="stat-label">poprawnych odpowiedzi</span>
                    </div>
                </div>
                    <button id="restartBtn" class="btn btn-success">
                        zacznij od nowa
                    </button>
                </div>
            </div>

            <!-- Error State -->
            <div id="errorState" class="state error-state hidden">
                <div class="error-content">
                    <span class="error-icon">⚠️</span>
                    <h2>Błąd!</h2>
                    <p id="errorMessage">Nie można załadować pytań. Sprawdź plik pytania.json</p>
                    <button id="retryBtn" class="btn btn-primary">
                        spróbuj ponownie
                    </button>
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 mateq2005</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
